<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>CRUD Productos</title>

</head>

<body class="container mt-5">

<h2>Lista de Productos</h2>

<form th:action="@{/}" method="get" class="row g-2 align-items-center mb-3">
    <div class="col-auto">
        <input type="text" name="nombre" class="form-control" placeholder="Buscar por nombre" th:value="${nombre != null ? nombre : ''}" />
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary">Buscar</button>
    </div>
    <div class="col-auto">
        <a th:href="@{/}" class="btn btn-outline-secondary">Limpiar</a>
    </div>
</form>

<a href="/nuevo" class="btn btn-success mb-3">
Nuevo Producto
</a>

<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Precio</th>
<th>Acciones</th>

</tr>

<tr th:each="p : ${productos}">

<td th:text="${p.id}"></td>

<td th:text="${p.nombre}"></td>

<td th:text="${p.precio}"></td>

<td>

<a th:href="@{/editar/{id}(id=${p.id})}" class="btn btn-warning">
Editar
</a>

<a th:href="@{/eliminar/{id}(id=${p.id})}" class="btn btn-danger">
Eliminar
</a>

</td>

</tr>

</table>

</body>
</html>
